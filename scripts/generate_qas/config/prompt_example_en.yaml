              * If **"evidence_span"** does not contain a clear description, or if it is absent altogether, then it is permissible to output `mapped_path = ["Other"]`.
            → You MUST output `mapped_path = ["Other"]`, the `mapped_path` should be `["Other"]`, and `normalized_name` should be `"Other"`.
            → You MUST NOT select a “seemingly reasonable” node from another tree to force a match

          [Correct Behavior]:
          - Always prioritize correct tree type over semantic similarity
        -----------------------------------
        [Input and Output Mapping Examples]

      [Input JSON]:
      {"clinical_entity": "pulmonary tuberculosis", "presence": "present", "location": "right upper lobe", "distribution": "right", "certainty": "definite", "evidence_span": "tuberculous lesion in the right upper lobe, consistent with pulmonary tuberculosis"}

      [Output JSON Format]:
      {
          "clinical_entity": {
            "raw": "pulmonary tuberculosis",
            "mapped_path": ["Disease", "Diffuse Parenchymal Lung Diseases", "Pulmonary Inflammation", "Infectious Pulmonary Inflammation", "Mycobacterial Infection (including active pulmonary tuberculosis)"],
            "normalized_name": "Mycobacterial Infection (including active pulmonary tuberculosis)"
          },
          "presence": {
            "raw": "present",
            "mapped_path": ["Attributes", "Presence", "present"],
            "normalized_name": "present"
          },
          "location": {
            "raw": "right upper lobe",
            "mapped_path": ["Anatomy", "Thoracic Parenchyma", "Lung", "Upper Lobe"],
            "normalized_name": "Upper Lobe"
          },
          "distribution": {
            "raw": "right",
            "mapped_path": ["Attributes", "Spatial distribution", "Laterality", "right"],
            "normalized_name": "right"
          },
          "certainty": {
            "raw": "definite",
            "mapped_path": ["Attributes", "Certainty", "definite"],
            "normalized_name": "definite"
          }
      }

      -----------------------------------
      [Task Execution]

      PURE JSON OUTPUT ONLY. Do not include markdown markers such as ```json or any explanatory text.
      -----------------------------------
      [Input Content]

      Extracted Entities JSON:
      {input_json}
